services:
  backend:
    build:
      context: ./backend
    image: careerpath-backend:latest
    container_name: careerpath-backend
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      USE_LOCAL_EMBEDDINGS: "true"
      CHROMA_HOST: "chroma"
      CHROMA_PORT: "8000"
    depends_on:
      - chroma
    # Backend no longer performs any AI inference — frontend calls Hugging
    # Face directly. No env vars required for AI routes.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        # Frontend is built statically; this URL is baked into the bundle.
        # Point it at the backend service name when both run in this stack,
        # or override to a public URL for production builds.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:7860}
    image: careerpath-frontend:latest
    container_name: careerpath-frontend
    # Host port 18080 -> container nginx :80. Avoid 5173/8080 clashes.
    ports:
      - "18080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma_data:
